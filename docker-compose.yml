services:
  acropolis:
    build: .
    container_name: acropolis-bot
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: acropolis-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - acropolis
